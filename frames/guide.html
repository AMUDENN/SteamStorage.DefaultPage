<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation — SteamStorage</title>
    <link href="../css/main-style.css" rel="stylesheet" type="text/css"/>
    <link href="../css/guide-style.css" rel="stylesheet" type="text/css"/>
</head>
<body>
<div class="wrapper">
    <div class="main-content">
        <section class="guide-section">

            <!-- Repository tab buttons -->
            <div class="repo-tabs">
                <button class="repo-tab-btn active" data-tab="app">SteamStorage</button>
                <button class="repo-tab-btn" data-tab="api">SteamStorageAPI</button>
                <button class="repo-tab-btn" data-tab="sdk">SteamStorageAPI.SDK</button>
                <button class="repo-tab-btn" data-tab="page">DefaultPage</button>
            </div>

            <!-- ================================================
                 TAB: SteamStorage desktop app  (dynamic)
                 ================================================ -->
            <div class="tab-panel active" id="tab-app">
                <div class="guide-container grid-container">
                    <div class="guide-navigation"><nav></nav></div>
                    <div class="guide flex-container">
                        <div class="guide-text md-content"></div>
                    </div>
                </div>
            </div>

            <!-- ================================================
                 TAB: SteamStorageAPI  (dynamic)
                 ================================================ -->
            <div class="tab-panel" id="tab-api">
                <div class="guide-container grid-container">
                    <div class="guide-navigation"><nav></nav></div>
                    <div class="guide flex-container">
                        <div class="guide-text md-content"></div>
                    </div>
                </div>
            </div>

            <!-- ================================================
                 TAB: SteamStorageAPI.SDK  (dynamic)
                 ================================================ -->
            <div class="tab-panel" id="tab-sdk">
                <div class="guide-container grid-container">
                    <div class="guide-navigation"><nav></nav></div>
                    <div class="guide flex-container">
                        <div class="guide-text md-content"></div>
                    </div>
                </div>
            </div>

            <!-- ================================================
                 TAB: DefaultPage  (dynamic)
                 ================================================ -->
            <div class="tab-panel" id="tab-page">
                <div class="guide-container grid-container">
                    <div class="guide-navigation"><nav></nav></div>
                    <div class="guide flex-container">
                        <div class="guide-text md-content"></div>
                    </div>
                </div>
            </div>

        </section>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../js/guide.js"></script>
</body>
</html>
