name: HTML Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install html5validator
        run: pip install html5validator

      - name: Validate HTML files
        run: |
          html5validator \
            --root . \
            --match "*.html" \
            --ignore-re "Attribute .data-tab. not allowed" \
            --log INFO
