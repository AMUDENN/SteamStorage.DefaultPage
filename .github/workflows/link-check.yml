name: Link Check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Every Monday at 09:00 UTC — catches links that rot over time
    - cron: '0 9 * * 1'

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: |
            --verbose
            --no-progress
            --exclude-mail
            --exclude 'localhost'
            --exclude 'http://localhost'
            --timeout 20
            --retry-wait-time 5
            --max-retries 3
            './**/*.html'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
